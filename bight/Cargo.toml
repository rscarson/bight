[package]
name = "bight"
version = "0.1.1-d"
edition = "2024"
authors = [
  "WASDetchan",
]
license = "MIT"
description = "A spreadsheed engine and editor"
repository = "https://github.com/WASDetchan/bight"

[dependencies]
thiserror = "2.0"
crossterm = {version ="0.29", features = ["event-stream"]}
tokio = {version = "1.48", features = ["full"]}
futures = "0.3"
edit = "0.1.5"
mlua = { version = "0.10", features = ["async", "luajit", "send"] }
log = "0.4.28"
env_logger = "0.11.8"
arboard = {version = "3.6", features = ["wayland-data-control"]}
hashbrown = "0.15.5"
rkyv = { version = "0.8.12", features = ["bytecheck", "hashbrown-0_15"] }
csv = "1.4.0"
bon = "3.8.1"
